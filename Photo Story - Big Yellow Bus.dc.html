<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:{{ shellPaddingLeft }}; padding-top:{{ shellPaddingTop }}; box-sizing:border-box;">

  <dc-import name="Nav" current="photo-stories" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="The Big Yellow Bus Returns to Klukwan" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:12px;">Photo Stories</div>
    <h1 style="font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:34px; margin:0 0 16px; text-align:center; max-width:640px;">The Big Yellow Bus Returns to Klukwan</h1>
    <a href="https://www.chilkatvalleynews.com/2025/03/22/the-big-yellow-school-bus-returns-to-kluwkan/" style="font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:#999999; text-decoration:none; margin-bottom:44px;">Read the article on Chilkat Valley News <span style="color:#bbbbbb;">↗</span></a>

    <dc-import name="PhotoStack" items="{{ images }}" hint-size="100%,1200px"></dc-import>
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}">
const IMAGES = [
  './images/dscf2224.jpg',
  './images/dscf2253-enhanced-nr.jpg',
  './images/dscf2246.jpg',
  './images/dscf2290-enhanced-nr.jpg',
  './images/dscf2307-enhanced-nr.jpg',
  './images/dscf2308-enhanced-nr.jpg',
  './images/dscf2328.jpg',
  './images/dscf2065.jpg',
  './images/dscf2369-enhanced-nr-2.jpg',
  './images/dscf2382-enhanced-nr.jpg',
  './images/dscf2231.jpg',
];

class Component extends DCLogic {
  state = {
    isMobile: typeof window !== 'undefined' && window.innerWidth <= 768,
  };

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth <= 768;
      if (m !== this.state.isMobile) this.setState({ isMobile: m });
    };
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    return {
      shellPaddingLeft: this.state.isMobile ? '0px' : '240px',
      shellPaddingTop: this.state.isMobile ? '60px' : '0px',
      images: IMAGES,
    };
  }
}

</script>
</body>
</html>
