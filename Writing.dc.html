<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:{{ shellPaddingLeft }}; padding-top:{{ shellPaddingTop }}; box-sizing:border-box;">

  <dc-import name="Nav" current="writing" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="Writing" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:28px;">Writing</div>

    <p style="max-width:560px; text-align:center; font-size:17px; line-height:1.7; font-style:italic; color:#444444; margin-bottom:48px;">
      I write the news each week in Haines, Alaska. Below are links to some hard news, some essays, some personal writing, and some in between:
    </p>

    <div style="display:flex; flex-direction:column; gap:30px; max-width:560px; width:100%;">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
        <div style="display:flex; flex-direction:column; gap:6px; padding-bottom:26px; border-bottom:1px solid #eeeeee;">
          <a href="{{ link.url }}" style="font-family:Georgia,'Times New Roman',serif; font-size:22px; font-weight:400; text-align:left; letter-spacing:-0.01em; line-height:1.35;" style-after="content:' \2197'; margin-left:8px; font-size:15px; color:#aaaaaa;">{{ link.title }}</a>
          <p style="margin:0; min-height:20px; font-size:14px; line-height:1.6; color:#888888; text-align:left; font-style:normal;">{{ link.description }}</p>
        </div>
      </sc-for>
    </div>
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}">
const LINKS = [
  { title: "Behind the battle for Haines' cruise ship dock", url: 'https://www.chilkatvalleynews.com/2026/06/25/multiple-companies-circle-local-cruise-ship-dock/', description: 'An investigation into competition in the Alaska cruise ship industry.' },
  { title: 'In The Wake of the Water', url: 'https://placesjournal.org/article/in-the-wake-of-the-water/', description: "For Places Journal: Rhode Island's flood response infrastructure and the risk calculus of ordinary residents." },
  { title: 'Living off the land and eating hotdogs', url: 'https://willsteinfeld.substack.com/p/living-off-the-land-eating-hotdogs', description: 'From my Substack: the height of summer atop the Inside Passage.' },
  { title: 'Haines man finds long lost father in Scotland', url: 'https://longreads.com/2025/05/29/haines-man-finds-long-lost-father-in-scotland/', description: "A story of a Haines man's search for a James Bond father. A Longreads editors' pick." },
  { title: 'Cruise ship environmental compliance funds budgeted for port infrastructure', url: 'https://www.juneauindependent.com/post/cruise-ship-environmental-compliance-funds-budgeted-for-port-infrastructure', description: "Reporting from the State Capitol in Juneau on controversial funds moving around the state's budget." },
  { title: 'Landslide maps go unused, what comes next?', url: 'https://www.chilkatvalleynews.com/2025/11/06/haines-landslide-maps-unused-what-comes-next/', description: 'Looking at the aftermath of a deadly landslide in Haines, and how the local governments, and residents, are struggling to build systems to deal with future risk.' },
  { title: '\u201cThe experts are saying drastically different things,\u201d say assembly members on Lutak Dock', url: 'https://www.chilkatvalleynews.com/2026/05/21/the-experts-are-saying-drastically-different-things-say-assembly-members-on-lutak-dock/', description: "Weekly government accountability beat reporting in the Chilkat Valley. Examines complications with the borough's fraught infrastructure project." },
];

class Component extends DCLogic {
  state = {
    isMobile: typeof window !== 'undefined' && window.innerWidth <= 768,
  };

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth <= 768;
      if (m !== this.state.isMobile) this.setState({ isMobile: m });
    };
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    return {
      shellPaddingLeft: this.state.isMobile ? '0px' : '240px',
      shellPaddingTop: this.state.isMobile ? '60px' : '0px',
      links: LINKS,
    };
  }
}

</script>
</body>
</html>
