<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:{{ shellPaddingLeft }}; padding-top:{{ shellPaddingTop }}; box-sizing:border-box;">

  <dc-import name="Nav" current="radio" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="Radio" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:12px;">Radio</div>
    <p style="max-width:560px; font-size:16px; line-height:1.6; color:#333333; text-align:center; margin:0 0 20px;">In addition to newspaper duties, I've been drafted into bi-weekly municipal government coverage for KHNS, the Lynn Canal's public radio station. Here's what those stories sound like:</p>

    <a href="https://www.google.com/search?q=will+steinfeld+khns+plastic+bag&sca_esv=8c91114504bbe1b2&sxsrf=APpeQntAtjYvS0FtROSz83Qkmr9dIZ1BKg%3A1783486636169&ei=rNhNar_DCfCc0PEPmNaFmQg&biw=1512&bih=852&ved=0ahUKEwi_yaO7pcKVAxVwDjQIHRhrIYMQ4dUDCBA&uact=5&oq=will+steinfeld+khns+plastic+bag&gs_lp=Egxnd3Mtd2l6LXNlcnAiH3dpbGwgc3RlaW5mZWxkIGtobnMgcGxhc3RpYyBiYWcyBRAhGKABMgUQIRigATIFECEYoAEyBRAhGKABMgUQIRigAUjhDVDoAljZDHABeACQAQCYAf8DoAHTDKoBBzMtMi4xLjG4AQPIAQD4AQGYAgWgAuEMwgILEAAYgAQYogQYsAPCAggQABjvBRiwA5gDAIgGAZAGBJIHBzEuMy0yLjKgB8gRsgcFMy0yLjK4B94MwgcDMC41yAcHgAgB&sclient=gws-wiz-serp" style="font-family:Georgia,'Times New Roman',serif; font-size:20px; font-weight:400; color:#111111; text-decoration:none; text-align:center; max-width:560px; line-height:1.4;">No changes to Haines' plastic bag policy, despite poetic protest <span style="color:#bbbbbb; font-size:15px;">↗</span></a>

    <img src="./images/radio-photo-1.webp" alt="" style="width:220px; aspect-ratio:3/2; object-fit:cover; display:block; margin-top:32px;" />
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}">
class Component extends DCLogic {
  state = {
    isMobile: typeof window !== 'undefined' && window.innerWidth <= 768,
  };

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth <= 768;
      if (m !== this.state.isMobile) this.setState({ isMobile: m });
    };
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    return {
      shellPaddingLeft: this.state.isMobile ? '0px' : '240px',
      shellPaddingTop: this.state.isMobile ? '60px' : '0px',
    };
  }
}
</script>
</body>
</html>
