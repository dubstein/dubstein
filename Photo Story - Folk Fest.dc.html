<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:{{ shellPaddingLeft }}; padding-top:{{ shellPaddingTop }}; box-sizing:border-box;">

  <dc-import name="Nav" current="photo-stories" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="Haines Night at Folk Fest" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:12px;">Photo Stories</div>
    <h1 style="font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:34px; margin:0 0 16px; text-align:center; max-width:640px;">Haines Night at the 50th Alaska Folk Fest</h1>
    <a href="https://www.chilkatvalleynews.com/2025/04/10/local-musicians-travel-to-juneau-to-play-for-haines-night-at-50th-folk-festival/" style="font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:#999999; text-decoration:none; margin-bottom:44px;">Read the article on Chilkat Valley News <span style="color:#bbbbbb;">↗</span></a>

    <dc-import name="PhotoStack" items="{{ images }}" hint-size="100%,1200px"></dc-import>
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}">
const IMAGES = [
  { url: './images/dscf3729-1.jpg' },
  { url: './images/dscf3419-enhanced-nr-1.jpg', caption: 'Lucy Nieboer and Henry Leasia hug after their set at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3379-enhanced-nr-1.jpg', caption: 'Joel Stuk plays guitar at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3690-enhanced-nr-1.jpg', caption: 'Henry Leasia plays keys with band Keep the Pool Open at the Crystal Saloon in Juneau Tuesday night. Leasia played with two bands, Keep the Pool Open and Nalimu (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3362-enhanced-nr-1.jpg', caption: 'Lucy Nieboer brings an audience member to the stage at the Crystal Saloon in Juneau Tuesday night for an impromptu speech about the Haines Pool. That was during the set of relevantly-named Keep the Pool Open (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3379-enhanced-nr-1.jpg', caption: 'Joel Stuk plays guitar at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3417-enhanced-nr-1.jpg', caption: 'Lucy Nieboer finishes her set with Keep the Pool Open at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3306-enhanced-nr-1.jpg', caption: 'Lucy Nieboer onstage at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3796-enhanced-nr-1.jpg', caption: 'Joel Stuk singing at the Crystal Saloon in Juneau Tuesday night. Stuk played with Keep the Pool Open and Nalimu (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3259-1.jpg', caption: 'Keep the Pool Open hugs before going on at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3758-1.jpg', caption: 'Lucy Nieboer plays onstage at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3337-enhanced-nr-1.jpg', caption: 'Lucy Nieboer onstage at the Crystal Saloon in Juneau Tuesday night (Will Steinfeld/Chilkat Valley News).' },
  { url: './images/dscf3516-1.jpg', caption: 'Ryan Irvin plays onstage at the Crystal Saloon in Juneau Tuesday night. Irvin\u2019s set was part of Haines Night at the Alaska Folk Festival (Will Steinfeld/Chilkat Valley News).' },
];

class Component extends DCLogic {
  state = {
    isMobile: typeof window !== 'undefined' && window.innerWidth <= 768,
  };

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth <= 768;
      if (m !== this.state.isMobile) this.setState({ isMobile: m });
    };
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    return {
      shellPaddingLeft: this.state.isMobile ? '0px' : '240px',
      shellPaddingTop: this.state.isMobile ? '60px' : '0px',
      images: IMAGES,
    };
  }
}

</script>
</body>
</html>
