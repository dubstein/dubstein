<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:240px; box-sizing:border-box;">

  <dc-import name="Nav" current="photo-stories" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="Stream Jumping" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:12px;">Photo Stories</div>
    <h1 style="font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:34px; margin:0 0 44px; text-align:center; max-width:640px;">Stream Jumping</h1>

    <dc-import name="PhotoStack" items="{{ images }}" hint-size="100%,1200px"></dc-import>
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}">
const IMAGES = [
  { url: './images/dscf4994.jpg', caption: 'Participants in Tuesday\u2019s Haines Public Library Trail Adventure explore a creek across from Pyramid Island. (Will Steinfeld/Chilkat Valley News)' },
  { url: './images/dscf4967.jpg', caption: 'Owen Stickel, Elias Mason, and Luke Hall explore a creek across from Pyramid Island during Tuesday\u2019s Haines Public Library Trail Adventure (Will Steinfeld/Chilkat Valley News)' },
  { url: './images/dscf5058.jpg', caption: 'Emma Coblent, Aurora Mason, Sadie Stickel, and Heather fight through a stiff wind across from Pyramid Island during Tuesday\u2019s Haines Public Library Trail Adventure. (Will Steinfeld/Chilkat Valley News)' },
  { url: './images/dscf4990.jpg', caption: 'Elias Mason, Luke Hall, and Owen Stickel explore a creek across from Pyramid Island during Tuesday\u2019s Haines Public Library Trail Adventure (Will Steinfeld/Chilkat Valley News)' },
  { url: './images/dscf4981.jpg', caption: 'Elias Mason jumps a creek across from Pyramid Island during Tuesday\u2019s Haines Public Library Trail Adventure (Will Steinfeld/Chilkat Valley News)' },
];

class Component extends DCLogic {
  renderVals() {
    return { images: IMAGES };
  }
}

</script>
</body>
</html>
