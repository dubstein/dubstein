<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>

<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:240px; box-sizing:border-box;">

  <dc-import name="Nav" current="about" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="About" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:28px;">About</div>

    <div style="display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:center; gap:48px; max-width:820px; width:100%;">
      <img
        src="https://willsteinfeld.com/wp-content/uploads/2024/10/img_3673.jpg"
        alt=""
        style="width:320px; max-width:100%; aspect-ratio:4/3; object-fit:cover; display:block; flex-shrink:0;"
      />

      <div style="flex:1; min-width:280px; display:flex; flex-direction:column; gap:22px; text-align:left; font-size:17px; line-height:1.7;">
        <p style="margin:0;">Hi, I'm Will. I'm a writer and photographer in Haines, Alaska. You can find me every Thursday in the Chilkat Valley News.</p>

        <div>
          <p style="margin:0 0 6px; color:#666666;">Reach out and say hi:</p>
          <a href="mailto:steinfeldswilliam@gmail.com" style="font-size:17px;">steinfeldswilliam@gmail.com</a>
        </div>

        <div style="display:flex; align-items:center; gap:10px; font-size:14px; letter-spacing:0.06em; text-transform:uppercase; color:#999999;">
          <a href="https://willsteinfeld.substack.com/" style="color:#999999;">Substack</a>
          <span style="color:#dddddd;">·</span>
          <a href="https://www.instagram.com/willsteinfeld/" style="color:#999999;">Instagram</a>
          <span style="color:#dddddd;">·</span>
          <a href="https://www.linkedin.com/in/will-steinfeld-b897b7222/" style="color:#999999;">LinkedIn</a>
        </div>
      </div>
    </div>
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}"></script>
