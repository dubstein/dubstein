<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:28px; max-width:720px; width:100%; margin:0 auto;">
  <sc-for list="{{ items }}" as="item" hint-placeholder-count="3">
    <figure style="margin:0;">
      <img src="{{ item.url }}" alt="" style="width:100%; display:block; object-fit:cover;" />
      <sc-if value="{{ item.hasCaption }}" hint-placeholder-val="{{ false }}">
        <figcaption style="margin-top:10px; font-size:13px; font-style:italic; color:#777777; line-height:1.5;">{{ item.caption }}</figcaption>
      </sc-if>
    </figure>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 720, &quot;height&quot;: 480}, &quot;items&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [], &quot;tsType&quot;: &quot;Array&lt;string | {url: string, caption?: string}&gt;&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const raw = this.props.items ?? [];
    const items = raw.map((it) => {
      if (typeof it === 'string') return { url: it, caption: '', hasCaption: false };
      return { url: it.url, caption: it.caption ?? '', hasCaption: !!(it.caption) };
    });
    return { items };
  }
}

</script>
</body>
</html>
