<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f5f3f0"/><text x="50" y="62" font-family="Georgia,serif" font-size="42" text-anchor="middle" fill="#111111">W</text></svg></template>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; background: #ffffff; }
  a { color: #111111; text-decoration: none; }
  a:hover { color: #666666; }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; background:#ffffff; color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding-left:{{ shellPaddingLeft }}; padding-top:{{ shellPaddingTop }}; box-sizing:border-box;">

  <dc-import name="Nav" current="personal" menu-scale="0.85" nav-offset-y="40" hint-size="100%,90px"></dc-import>

  <main data-screen-label="The Band" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:64px 24px 96px;">
    <div style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#999999; margin-bottom:12px;">Personal</div>
    <h1 style="font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:34px; margin:0 0 20px; text-align:center;">The Band</h1>

    <p style="max-width:560px; text-align:center; font-size:17px; line-height:1.7; color:#444444; margin-bottom:12px;">
      Inside the world of the Brown University Marching Band.
    </p>
    <p style="margin-bottom:44px; font-size:15px;">
      <a href="https://indd.adobe.com/view/c1416a73-30f6-4cde-980b-135a2512003c">Read Here</a>
    </p>

    <dc-import name="PhotoStack" items="{{ images }}" hint-size="100%,1200px"></dc-import>
  </main>

  <dc-import name="Footer" hint-size="100%,90px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100}}">
const IMAGES = [
  './images/DSCF0841.jpg',
  './images/DSCF3463.jpg',
  './images/DSCF3603.jpg',
  './images/DSCF4107.jpg',
  './images/DSCF8577.jpg',
  './images/DSCF9308.jpg',
];

class Component extends DCLogic {
  state = {
    isMobile: typeof window !== 'undefined' && window.innerWidth <= 768,
  };

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth <= 768;
      if (m !== this.state.isMobile) this.setState({ isMobile: m });
    };
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    return {
      shellPaddingLeft: this.state.isMobile ? '0px' : '240px',
      shellPaddingTop: this.state.isMobile ? '60px' : '0px',
      images: IMAGES,
    };
  }
}

</script>
</body>
</html>
